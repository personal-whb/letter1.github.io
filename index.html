<html>

<head>
    <meta charset="utf-8">
    <title>给小张童鞋的一封信</title>
    <meta name="language" content="zh-CN">
    <meta name="title" content="小张童鞋">
    <link rel="icon" type="image/x-icon" href="https://cdn.jsdelivr.net/gh/sun0225SUN/photos/img/20210715233345.png">
    <link href="css/hovertreewelcome.css" type="text/css" rel="stylesheet">
    <style>
        #mood-section {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.9s ease;
        }
        #mood-section.is-visible {
            opacity: 1;
            pointer-events: auto;
        }
        #h3 {
            visibility: hidden;
        }
        #h3.transition-in {
            visibility: visible;
        }
        #h3 [class^="letter-"] {
            opacity: 0;
        }
        #h3.transition-in [class^="letter-"] {
            opacity: 1;
        }

        /* ── Fancy buttons ── */
        .fancy-btn {
            margin: 0 14px;
            padding: 13px 34px;
            font-size: 1.05rem;
            font-weight: bold;
            letter-spacing: 1px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        #btn-expect {
            background: linear-gradient(135deg, #f9a8d4 0%, #f472b6 40%, #c084fc 100%);
            color: #fff;
            box-shadow: 0 4px 18px rgba(244,114,182,0.55), 0 0 24px rgba(192,132,252,0.35);
            animation: pulse-expect 2.2s ease-in-out infinite;
            transform-origin: center;
            transition: box-shadow 0.3s ease, filter 0.3s ease,
                        transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }
        #btn-expect:hover {
            filter: brightness(1.15);
            box-shadow: 0 6px 28px rgba(244,114,182,0.75), 0 0 36px rgba(192,132,252,0.55);
        }
        @keyframes pulse-expect {
            0%,100% { box-shadow: 0 4px 18px rgba(244,114,182,0.55), 0 0 24px rgba(192,132,252,0.35); }
            50%      { box-shadow: 0 4px 32px rgba(244,114,182,0.85), 0 0 48px rgba(192,132,252,0.65); }
        }
        #btn-run {
            background: linear-gradient(135deg, #67e8f9 0%, #38bdf8 50%, #818cf8 100%);
            color: #fff;
            box-shadow: 0 4px 18px rgba(56,189,248,0.5), 0 0 20px rgba(129,140,248,0.35);
            transition: box-shadow 0.3s ease, filter 0.3s ease;
        }
        #btn-run:hover {
            filter: brightness(1.15);
            box-shadow: 0 6px 28px rgba(56,189,248,0.75), 0 0 32px rgba(129,140,248,0.55);
        }

        /* ── Arrows (positioned by JS, shaft + head design) ── */
        .arrow-pos {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .arrow-pos.visible { opacity: 1; }
        .arrow-h {
            display: inline-flex;
            align-items: center;
            color: #f9a8d4;
            filter: drop-shadow(0 0 10px rgba(244,114,182,0.95));
        }
        .arrow-v {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            color: #f9a8d4;
            filter: drop-shadow(0 0 10px rgba(244,114,182,0.95));
        }
        .shaft-h { width: 45px; height: 3px; background: currentColor; border-radius: 2px; }
        .shaft-v { width: 3px; height: 45px; background: currentColor; border-radius: 2px; }
        .arrow-head { font-size: 1.3rem; line-height: 1; }
        .arr-br { animation: arr-bounce-r 0.7s ease-in-out infinite alternate; }
        .arr-bl { animation: arr-bounce-l 0.7s ease-in-out infinite alternate; }
        .arr-bd { animation: arr-bounce-d 0.7s ease-in-out infinite alternate; }
        .arr-bu { animation: arr-bounce-u 0.7s ease-in-out infinite alternate; }
        @keyframes arr-bounce-r { from{transform:translateX(0)}  to{transform:translateX(9px)}  }
        @keyframes arr-bounce-l { from{transform:translateX(0)}  to{transform:translateX(-9px)} }
        @keyframes arr-bounce-d { from{transform:translateY(0)}  to{transform:translateY(9px)}  }
        @keyframes arr-bounce-u { from{transform:translateY(0)}  to{transform:translateY(-9px)} }

        /* ── Run messages: normal flow, stacks below btn-group, above scaled button ── */
        #run-messages {
            position: relative;
            z-index: 1000;
            margin-top: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            pointer-events: none;
        }
        .run-msg {
            color: #fff;
            font-size: 1.15rem;
            font-weight: bold;
            text-shadow: 0 0 16px rgba(244,114,182,1), 0 2px 6px rgba(0,0,0,0.5);
            animation: fadeInUp 0.5s ease;
            margin: 0;
            white-space: nowrap;
            background: rgba(244,114,182,0.18);
            padding: 5px 20px;
            border-radius: 20px;
            border: 1px solid rgba(244,114,182,0.45);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0);    }
        }
    </style>
</head>

<body>
    <div id="hovertreecontainer">

        <div>
            <h1 id="h1">给小张童鞋的一封信</h1>
            <br>
            <h2 id="h2">这是给你写的第一封信</h2>
            <br>
            <div id="mood-section">
            <h3 id="h3">看到这个标题的你是什么心情呀？</h3>
            <!-- 按钮区域 -->
            <div id="btn-group" style="position:relative; z-index:100; pointer-events:auto; display:flex; align-items:center; justify-content:center; padding:12px 20px; overflow:visible;">
                <div class="arrow-pos" id="arrow-left"><span class="arrow-h arr-br"><span class="shaft-h"></span><span class="arrow-head">▶</span></span></div>
                <div class="arrow-pos" id="arrow-right"><span class="arrow-h arr-bl"><span class="arrow-head">◀</span><span class="shaft-h"></span></span></div>
                <div class="arrow-pos" id="arrow-top"><span class="arrow-v arr-bd"><span class="shaft-v"></span><span class="arrow-head">▼</span></span></div>
                <div class="arrow-pos" id="arrow-bot"><span class="arrow-v arr-bu"><span class="arrow-head">▲</span><span class="shaft-v"></span></span></div>
                <button id="btn-expect" onclick="handleExpect(true)" class="fancy-btn">一整个期待住了～</button>
                <button id="btn-run" onclick="handleExpect(false)" class="fancy-btn">我可以跑呀～</button>
            </div>
            <div id="run-messages"></div>
            </div>
            <!-- 响应文本，初始隐藏 -->
            <h3 id="response-text" style="display:none; position:relative; z-index:100;"></h3>
            <p>&nbsp;</p>
            <p>&nbsp;</p>
            <p>&nbsp;</p>
            <p>&nbsp;</p>
            <p>&nbsp;</p>
            <p>&nbsp;</p>
        </div>

    </div>

    <canvas id="canvas" style="pointer-events:none;"></canvas>
    <audio id="bgmMusic" src="bgm.mp3" loop preload="auto" type="audio/mpeg" autoplay>
        您的浏览器不支持播放音乐。请用支持html5的浏览器打开,例如chrome或火狐或者新版IE等。
    </audio>
    <script type="text/javascript" src="js/bgm-persist.js"></script>
    <script type="text/javascript" src="js/hovertreewelcome.js">
    </script>
    <script type="text/javascript">

        ; (function (window) {

            var ctx,
                hue,
                logo,
                form,
                buffer,
                target = {},
                tendrils = [],
                settings = {};

            settings.debug = true;
            settings.friction = 0.5;
            settings.trails = 20;
            settings.size = 50;
            settings.dampening = 0.25;
            settings.tension = 0.98;

            Math.TWO_PI = Math.PI * 2;

            // ========================================================================================
            // Oscillator 何问起
            // ----------------------------------------------------------------------------------------

            function Oscillator(options) {
                this.init(options || {});
            }

            Oscillator.prototype = (function () {

                var value = 0;

                return {

                    init: function (options) {
                        this.phase = options.phase || 0;
                        this.offset = options.offset || 0;
                        this.frequency = options.frequency || 0.001;
                        this.amplitude = options.amplitude || 1;
                    },

                    update: function () {
                        this.phase += this.frequency;
                        value = this.offset + Math.sin(this.phase) * this.amplitude;
                        return value;
                    },

                    value: function () {
                        return value;
                    }
                };

            })();

            // ========================================================================================
            // Tendril hovertree.com
            // ----------------------------------------------------------------------------------------

            function Tendril(options) {
                this.init(options || {});
            }

            Tendril.prototype = (function () {

                function Node() {
                    this.x = 0;
                    this.y = 0;
                    this.vy = 0;
                    this.vx = 0;
                }

                return {

                    init: function (options) {

                        this.spring = options.spring + (Math.random() * 0.1) - 0.05;
                        this.friction = settings.friction + (Math.random() * 0.01) - 0.005;
                        this.nodes = [];

                        for (var i = 0, node; i < settings.size; i++) {

                            node = new Node();
                            node.x = target.x;
                            node.y = target.y;

                            this.nodes.push(node);
                        }
                    },

                    update: function () {

                        var spring = this.spring,
                            node = this.nodes[0];

                        node.vx += (target.x - node.x) * spring;
                        node.vy += (target.y - node.y) * spring;

                        for (var prev, i = 0, n = this.nodes.length; i < n; i++) {

                            node = this.nodes[i];

                            if (i > 0) {

                                prev = this.nodes[i - 1];

                                node.vx += (prev.x - node.x) * spring;
                                node.vy += (prev.y - node.y) * spring;
                                node.vx += prev.vx * settings.dampening;
                                node.vy += prev.vy * settings.dampening;
                            }

                            node.vx *= this.friction;
                            node.vy *= this.friction;
                            node.x += node.vx;
                            node.y += node.vy;

                            spring *= settings.tension;
                        }
                    },

                    draw: function () {

                        var x = this.nodes[0].x,
                            y = this.nodes[0].y,
                            a, b;

                        ctx.beginPath();
                        ctx.moveTo(x, y);

                        for (var i = 1, n = this.nodes.length - 2; i < n; i++) {

                            a = this.nodes[i];
                            b = this.nodes[i + 1];
                            x = (a.x + b.x) * 0.5;
                            y = (a.y + b.y) * 0.5;

                            ctx.quadraticCurveTo(a.x, a.y, x, y);
                        }

                        a = this.nodes[i];
                        b = this.nodes[i + 1];

                        ctx.quadraticCurveTo(a.x, a.y, b.x, b.y);
                        ctx.stroke();
                        ctx.closePath();
                    }
                };

            })();

            // ----------------------------------------------------------------------------------------

            function init(event) {

                document.removeEventListener('mousemove', init);
                document.removeEventListener('touchstart', init);

                document.addEventListener('mousemove', mousemove);
                document.addEventListener('touchmove', mousemove);
                document.addEventListener('touchstart', touchstart);

                mousemove(event);
                reset();
                loop();
            }

            function reset() {

                tendrils = [];

                for (var i = 0; i < settings.trails; i++) {

                    tendrils.push(new Tendril({
                        spring: 0.45 + 0.025 * (i / settings.trails)
                    }));
                }
            }

            function loop() {

                if (!ctx.running) return;

                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = 'rgba(8,5,16,0.4)';
                ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                ctx.globalCompositeOperation = 'lighter';
                ctx.strokeStyle = 'hsla(' + Math.round(hue.update()) + ',90%,50%,0.25)';
                ctx.lineWidth = 1;

                if (ctx.frame % 60 == 0) {
                    console.log(hue.update(), Math.round(hue.update()), hue.phase, hue.offset, hue.frequency, hue.amplitude);
                }

                for (var i = 0, tendril; i < settings.trails; i++) {
                    tendril = tendrils[i];
                    tendril.update();
                    tendril.draw();
                }

                ctx.frame++;
                ctx.stats.update();
                requestAnimFrame(loop);
            }

            function resize() {
                ctx.canvas.width = window.innerWidth;
                ctx.canvas.height = window.innerHeight;
            }

            function start() {
                if (!ctx.running) {
                    ctx.running = true;
                    loop();
                }
            }

            function stop() {
                ctx.running = false;
            }

            function mousemove(event) {
                if (event.touches) {
                    target.x = event.touches[0].pageX;
                    target.y = event.touches[0].pageY;
                } else {
                    target.x = event.clientX
                    target.y = event.clientY;
                }
                event.preventDefault();
            }

            function touchstart(event) {
                if (event.touches.length == 1) {
                    target.x = event.touches[0].pageX;
                    target.y = event.touches[0].pageY;
                }
            }

            function keyup(event) {

                switch (event.keyCode) {
                    case 32:
                        save();
                        break;
                    default:
                    // console.log(event.keyCode); hovertree.com
                }
            }

            function letters(id, onLineComplete, transitionInDelay) {
                var delay = (typeof transitionInDelay === 'number')
                    ? transitionInDelay
                    : (Math.random() * 500) + 500;

                var el = document.getElementById(id),
                    letters = el.innerHTML.replace('&amp;', '&').split(''),
                    heading = '';

                for (var i = 0, n = letters.length, letter; i < n; i++) {
                    letter = letters[i].replace('&', '&amp');
                    heading += letter.trim() ? '<span class="letter-' + i + '">' + letter + '</span>' : '&nbsp;';
                }

                el.innerHTML = heading;
                function applyTransitionIn() {
                    el.className = 'transition-in';
                    if (onLineComplete) {
                        var spans = el.querySelectorAll('[class^="letter-"]');
                        if (!spans.length) {
                            onLineComplete();
                            return;
                        }
                        var last = spans[spans.length - 1];
                        function onLastLetterTransitionEnd(ev) {
                            if (ev.propertyName !== 'opacity') return;
                            last.removeEventListener('transitionend', onLastLetterTransitionEnd);
                            onLineComplete();
                        }
                        last.addEventListener('transitionend', onLastLetterTransitionEnd);
                    }
                }
                if (delay === 0) {
                    applyTransitionIn();
                } else {
                    setTimeout(applyTransitionIn, delay);
                }
            }

            function save() {

                if (!buffer) {

                    buffer = document.createElement('canvas');
                    buffer.width = screen.availWidth;
                    buffer.height = screen.availHeight;
                    buffer.ctx = buffer.getContext('2d');

                    form = document.createElement('form');
                    form.method = 'post';
                    form.input = document.createElement('input');
                    form.input.type = 'hidden';
                    form.input.name = 'data';
                    form.appendChild(form.input);

                    document.body.appendChild(form);
                }

                buffer.ctx.fillStyle = 'rgba(8,5,16)';
                buffer.ctx.fillRect(0, 0, buffer.width, buffer.height);

                buffer.ctx.drawImage(canvas,
                    Math.round(buffer.width / 2 - canvas.width / 2),
                    Math.round(buffer.height / 2 - canvas.height / 2)
                );

                buffer.ctx.drawImage(logo,
                    Math.round(buffer.width / 2 - logo.width / 4),
                    Math.round(buffer.height / 2 - logo.height / 4),
                    logo.width / 2,
                    logo.height / 2
                );

                window.open(buffer.toDataURL(), 'wallpaper', 'top=0,left=0,width=' + buffer.width + ',height=' + buffer.height);

                // form.input.value = buffer.toDataURL().substr(22);
                // form.submit(); hovertree.com
            }

            window.requestAnimFrame = (function () {
                return window.requestAnimationFrame || window.webkitRequestAnimationFrame || window.mozRequestAnimationFrame || function (fn) { window.setTimeout(fn, 1000 / 60) };
            })();

            window.onload = function () {

                ctx = document.getElementById('canvas').getContext('2d');
                ctx.stats = new Stats();
                ctx.running = true;
                ctx.frame = 1;

                logo = new Image();
                logo.src = 'ht' + 'tp://ho' + 'vertree.c' + 'om/themes/hvtimages/hvtlogo.p' + 'ng';

                hue = new Oscillator({
                    phase: Math.random() * Math.TWO_PI,
                    amplitude: 85,
                    frequency: 0.0015,
                    offset: 285
                });

                var firstLinesLeft = 2;
                function onFirstTwoLinesComplete() {
                    firstLinesLeft--;
                    if (firstLinesLeft > 0) return;
                    letters('h3', null, 0);
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            document.getElementById('mood-section').classList.add('is-visible');
                        });
                    });
                }
                letters('h1', onFirstTwoLinesComplete);
                letters('h2', onFirstTwoLinesComplete);

                document.addEventListener('mousemove', init);
                document.addEventListener('touchstart', init);
                document.body.addEventListener('orientationchange', resize);
                window.addEventListener('resize', resize);
                window.addEventListener('keyup', keyup);
                window.addEventListener('focus', start);
                window.addEventListener('blur', stop);

                // 添加全局点击事件监听器，点击页面任意位置跳转到page2/index2.html
                // document.addEventListener('click', function(event) {
                //     window.location.href = 'page2/index2.html';
                // });

                resize();

                if (window.DEBUG) {

                    var gui = new dat.GUI();

                    // gui.add(settings, 'debug');
                    settings.gui.add(settings, 'trails', 1, 30).onChange(reset);
                    settings.gui.add(settings, 'size', 25, 75).onFinishChange(reset);
                    settings.gui.add(settings, 'friction', 0.45, 0.55).onFinishChange(reset);
                    settings.gui.add(settings, 'dampening', 0.01, 0.4).onFinishChange(reset);
                    settings.gui.add(settings, 'tension', 0.95, 0.999).onFinishChange(reset);

                    document.body.appendChild(ctx.stats.domElement);
                }
            };

        })(window);

    </script>
    <script>
        var runClickCount = 0;
        var expectScale   = 1;
        var runMsgTexts   = [
            '还想跑？不可能给你这个机会！！！',
            '这么绝情的嘛～我好伤心啊～～～～',
            '别跑啦，再跑要追不上啦'
        ];

        function updateArrows() {
            var btn   = document.getElementById('btn-expect');
            var group = document.getElementById('btn-group');
            var br = btn.getBoundingClientRect();
            var gr = group.getBoundingClientRect();
            var bL = br.left   - gr.left,  bR = br.right  - gr.left;
            var bT = br.top    - gr.top,   bB = br.bottom - gr.top;
            var cX = bL + br.width / 2,    cY = bT + br.height / 2;
            var GAP = 10, SHAFT = 45, HEAD = 21, LEN = SHAFT + HEAD;

            var aL = document.getElementById('arrow-left');
            var aR = document.getElementById('arrow-right');
            var aT = document.getElementById('arrow-top');
            var aB = document.getElementById('arrow-bot');

            aL.style.left = (bL - GAP - LEN) + 'px';  aL.style.top = (cY - HEAD/2) + 'px';
            aR.style.left = (bR + GAP)        + 'px';  aR.style.top = (cY - HEAD/2) + 'px';
            aT.style.left = (cX - HEAD/2)     + 'px';  aT.style.top = (bT - GAP - LEN) + 'px';
            aB.style.left = (cX - HEAD/2)     + 'px';  aB.style.top = (bB + GAP)        + 'px';
        }

        function trackArrows(duration) {
            var end = Date.now() + duration;
            (function frame() {
                updateArrows();
                if (Date.now() < end) requestAnimationFrame(frame);
            })();
        }

        function handleExpect(isExpect) {
            var btnGroup     = document.getElementById('btn-group');
            var responseText = document.getElementById('response-text');

            if (isExpect) {
                btnGroup.style.display = 'none';
                document.getElementById('run-messages').style.display = 'none';
                responseText.style.display  = 'block';
                responseText.textContent    = '那么接下来请欣赏小王童鞋精心制作的童话故事~';
                document.addEventListener('click', function () {
                    window.location.href = 'page2/index2.html';
                });
            } else {
                runClickCount++;

                if (runClickCount <= runMsgTexts.length) {
                    var p = document.createElement('div');
                    p.className   = 'run-msg';
                    p.textContent = runMsgTexts[runClickCount - 1];
                    document.getElementById('run-messages').appendChild(p);
                }

                expectScale += 0.28;
                document.getElementById('btn-expect').style.transform = 'scale(' + expectScale + ')';

                if (runClickCount === 1) {
                    updateArrows();
                    document.querySelectorAll('.arrow-pos').forEach(function(a) {
                        a.classList.add('visible');
                    });
                }

                trackArrows(500);
            }
        }
    </script>
